name: Smart Building CI/CD

on:
  push:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Train Model
      run: |
        python train_model.py

    - name: Run Tests
      run: |
        pytest tests/

    - name: Build Docker Image
      run: |
        docker build -t smart-building-ai .